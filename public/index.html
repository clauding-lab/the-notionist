  <style>
    :root{
      --bg:#FAFAF9;--bg2:#FFF;--bg-h:#F2F2EE;
      --t1:#1A1A1A;--t2:#6B6B6B;--t3:#9B9B9B;--t4:#BCBCBC;
      --brd:#E8E8E4;--brd2:#F0F0EC;
      --acc:#D4634B;--acc-s:#FDF0ED;
      --tag-bg:#EDEDEA;--tag-t:#555;
      --s-new:#E8D44D;--s-live:#5B9F5B;--s-pri:#D4634B;--s-fav:#D48A3B;--s-keep:#7B8EA0;
      --r:8px;
      --fl:'Playfair Display',Georgia,serif;
      --fd:'Newsreader',Georgia,serif;
      --fb:'DM Sans',-apple-system,sans-serif;
      --fp:'Newsreader',Georgia,serif;
      --bh:54px;--ps:1.02rem;
    }
    [data-theme="dark"]{
      --bg:#131313;--bg2:#1A1A1A;--bg-h:#222;
      --t1:#E6E6E6;--t2:#999;--t3:#666;--t4:#444;
      --brd:#282828;--brd2:#1F1F1F;
      --acc:#E8795F;--acc-s:#2A1A16;
      --tag-bg:#252525;--tag-t:#AAA;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100dvh;line-height:1.45;transition:background .2s,color .2s}

    .tb{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--brd2);padding:0 14px}
    .tb-in{max-width:660px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:46px}

    /* Newspaper masthead logo */
    .logo{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none;color:var(--t1)}
    .logo-icon{width:22px;height:22px;flex-shrink:0}
    .logo-text{font-family:var(--fl);font-size:1.22rem;font-weight:700;letter-spacing:.02em;font-style:italic}

    .hdr-r{display:flex;align-items:center;gap:8px}
    .pill{font-size:.64rem;color:var(--t3);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
    .sync-w{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;border:1px solid var(--brd);background:var(--bg2);cursor:pointer;transition:all .15s}
    .sync-w:hover{border-color:var(--t3)}
    .sync-d{width:6px;height:6px;border-radius:50%;background:var(--s-live);flex-shrink:0;transition:background .3s}
    .sync-d.stale{background:var(--t4)}.sync-d.ing{background:var(--acc);animation:pls .8s ease infinite}
    @keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
    .sync-l{font-size:.64rem;color:var(--t2);font-weight:500;white-space:nowrap}

    .sb{max-width:660px;margin:0 auto;padding:7px 14px 0}
    .sw{position:relative}
    .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t4);pointer-events:none}
    .sinp{width:100%;padding:7px 11px 7px 30px;font-family:var(--fb);font-size:.82rem;border:1px solid var(--brd);border-radius:var(--r);background:var(--bg2);color:var(--t1);outline:none;transition:border-color .15s,box-shadow .15s}
    .sinp:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-s)}
    .sinp::placeholder{color:var(--t4)}

    .fr{max-width:660px;margin:0 auto;padding:7px 14px 4px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
    .fr::-webkit-scrollbar{display:none}
    .fc{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;font-family:var(--fb);font-size:.7rem;font-weight:500;border:1px solid var(--brd);border-radius:100px;background:var(--bg2);color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none}
    .fc:hover{border-color:var(--t3)}.fc.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
    .fc .n{font-size:.62rem;opacity:.5}
    .fs{width:1px;background:var(--brd);flex-shrink:0;margin:2px}

    .feed{max-width:660px;margin:0 auto;padding:2px 14px calc(var(--bh) + 16px)}
    .dg{margin-top:10px}.dl{font-size:.64rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;padding:3px 0 1px}

    .cd{display:block;padding:9px 0;border-bottom:1px solid var(--brd2);transition:opacity .12s;cursor:pointer;animation:fu .2s ease both}
    .cd:last-child{border-bottom:none}.cd:hover{opacity:.7}
    @keyframes fu{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
    .cd.ur .ct{font-weight:600;color:var(--t1)}.cd.rd .ct{font-weight:400;color:var(--t2)}.cd.rd .cd-d{color:var(--t4)}
    .cd-t{display:flex;align-items:center;gap:5px;margin-bottom:2px}
    .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .dot[data-s="New"]{background:var(--s-new)}.dot[data-s="Live"]{background:var(--s-live)}.dot[data-s="Priority"]{background:var(--s-pri)}.dot[data-s="Favourited"]{background:var(--s-fav)}.dot[data-s="Keep"]{background:var(--s-keep)}
    .cd-d{font-size:.68rem;color:var(--t3);font-weight:500}
    .cd-r{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--acc);opacity:.8}
    .ct{font-family:var(--fd);font-size:.98rem;line-height:1.28;letter-spacing:-.01em;transition:color .15s}
    .cd-b{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
    .tg{font-size:.64rem;font-weight:500;padding:1px 6px;border-radius:3px;background:var(--tag-bg);color:var(--tag-t)}
    .dt{font-size:.64rem;color:var(--t3);margin-left:auto}
    .emp{text-align:center;padding:40px 14px;color:var(--t3)}.emp-i{font-size:1.6rem;margin-bottom:6px;opacity:.3}
    .upd{max-width:660px;margin:0 auto;padding:4px 14px;font-size:.62rem;color:var(--t4);text-align:center}

    .bn{position:fixed;bottom:0;left:0;right:0;z-index:200;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--brd2);padding-bottom:env(safe-area-inset-bottom,0)}
    .bn-in{max-width:660px;margin:0 auto;display:flex;height:var(--bh)}
    .bt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:none;border:none;cursor:pointer;color:var(--t3);transition:color .12s;position:relative;font-family:var(--fb)}
    .bt:hover{color:var(--t2)}.bt.on{color:var(--t1)}
    .bt svg{width:19px;height:19px}.bt-l{font-size:.58rem;font-weight:500;letter-spacing:.02em}
    .bt .bdg{position:absolute;top:3px;right:calc(50% - 17px);min-width:14px;height:14px;border-radius:7px;background:var(--acc);color:#fff;font-size:.54rem;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 3px}

    #lv{transition:opacity .12s}#av{display:none}#av.op{display:block}#lv.hd{display:none}#sv{display:none}#sv.op{display:block}

    .rbar{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--brd2);padding:0 14px}
    .rbar-in{max-width:660px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:42px}
    .bk{display:flex;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:.76rem;font-weight:500;color:var(--t2);padding:4px 7px 4px 1px;border-radius:6px;transition:all .12s}
    .bk:hover{color:var(--t1);background:var(--bg-h)}
    .ra{display:flex;gap:4px}
    .ra a{display:inline-flex;align-items:center;gap:3px;font-family:var(--fb);font-size:.7rem;font-weight:500;padding:4px 9px;border-radius:6px;text-decoration:none;border:1px solid var(--brd);background:var(--bg2);color:var(--t2);transition:all .12s}
    .ra a:hover{color:var(--t1);border-color:var(--t3)}

    .rbody{max-width:620px;margin:0 auto;padding:20px 14px calc(var(--bh) + 24px);animation:fu .25s ease}
    .r-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
    .r-ttl{font-family:var(--fd);font-size:1.45rem;font-weight:600;line-height:1.2;letter-spacing:-.02em;margin-bottom:8px}
    .r-inf{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:.7rem;color:var(--t3);margin-bottom:20px}
    .r-inf .d3{width:3px;height:3px;border-radius:50%;background:var(--t4)}
    .r-bdg{display:inline-flex;align-items:center;gap:3px;font-size:.66rem;font-weight:500;padding:1px 6px;border-radius:3px;background:var(--tag-bg);color:var(--tag-t)}

    .prose{font-family:var(--fp);font-size:var(--ps);line-height:1.72;color:var(--t1)}
    .prose p{margin-bottom:.9em}
    .prose h2{font-size:calc(var(--ps)*1.2);font-weight:600;margin:1.4em 0 .45em}
    .prose h3{font-size:calc(var(--ps)*1.08);font-weight:600;margin:1.2em 0 .35em}
    .prose a{color:var(--acc);text-decoration-color:color-mix(in srgb,var(--acc) 30%,transparent);text-underline-offset:2px}
    .prose a:hover{text-decoration-color:var(--acc)}
    .prose strong{font-weight:600}
    .prose blockquote{margin:.9em 0;padding:.5em 1em;border-left:3px solid var(--acc);background:var(--acc-s);border-radius:0 6px 6px 0;font-style:italic}
    .prose figure{margin:1em 0}.prose figure img{max-width:100%;height:auto;border-radius:6px}
    .prose figcaption{font-family:var(--fb);font-size:.7rem;color:var(--t3);margin-top:3px;text-align:center}
    .prose hr{border:none;border-top:1px solid var(--brd);margin:1.3em 0}
    .prose ul,.prose ol{margin:.6em 0;padding-left:1.2em}.prose li{margin-bottom:.25em}
    .prose pre{background:var(--bg-h);border:1px solid var(--brd);border-radius:6px;padding:9px 11px;overflow-x:auto;margin:.9em 0;font-size:.82rem}
    .prose code{font-family:'SF Mono',Menlo,monospace;font-size:.84em;background:var(--tag-bg);padding:1px 4px;border-radius:3px}
    .prose pre code{background:none;padding:0}
    .pe{text-align:center;padding:28px 14px;color:var(--t3);font-family:var(--fb);font-size:.82rem}.pe a{color:var(--acc)}

    /* Settings */
    .s-body{max-width:620px;margin:0 auto;padding:20px 14px calc(var(--bh) + 24px)}
    .s-hdr{display:flex;align-items:center;gap:8px;margin-bottom:18px}
    .s-hdr svg{width:22px;height:22px}
    .s-hdr span{font-family:var(--fl);font-size:1.05rem;font-weight:700;font-style:italic}
    .sg{margin-bottom:18px}.sg-l{font-size:.64rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .sr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd2)}.sr:last-child{border-bottom:none}
    .sr-l{font-size:.84rem;color:var(--t1)}.sr-sub{font-size:.68rem;color:var(--t3);margin-top:1px}
    .tog{position:relative;width:40px;height:22px;flex-shrink:0}
    .tog input{opacity:0;width:0;height:0}
    .tog .sl{position:absolute;cursor:pointer;inset:0;background:var(--brd);border-radius:22px;transition:.2s}
    .tog .sl:before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--bg2);border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.12)}
    .tog input:checked+.sl{background:var(--acc)}.tog input:checked+.sl:before{transform:translateX(18px)}
    .ss{display:flex;gap:16px;padding:8px 0}
    .ss-i{display:flex;flex-direction:column}.ss-v{font-family:var(--fd);font-size:1.1rem;font-weight:600;line-height:1.2}.ss-l{font-size:.6rem;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
    .slider-row{display:flex;align-items:center;gap:10px;padding:6px 0 10px}
    .slider-row .sz-s{font-size:.78rem;color:var(--t3)}.slider-row .sz-l{font-size:1.15rem;color:var(--t3)}
    .sz-range{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--brd);outline:none}
    .sz-range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--bg);box-shadow:0 1px 3px rgba(0,0,0,.15)}
    .sz-range::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--bg)}
    .fo{display:flex;flex-direction:column;gap:4px;padding:6px 0 8px}
    .fo-i{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--r);border:1px solid var(--brd);background:var(--bg2);cursor:pointer;transition:all .15s}
    .fo-i:hover{border-color:var(--t3)}.fo-i.sel{border-color:var(--acc);background:var(--acc-s)}
    .fo-i .fn{font-size:.78rem;font-weight:500;color:var(--t1);min-width:100px}
    .fo-i .fv{font-size:.88rem;color:var(--t2);flex:1}
    .fo-i .fc-r{width:16px;height:16px;border-radius:50%;border:2px solid var(--brd);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .fo-i.sel .fc-r{border-color:var(--acc);background:var(--acc)}.fo-i.sel .fc-r::after{content:"";width:6px;height:6px;border-radius:50%;background:#fff}
    .s-btn{font-family:var(--fb);font-size:.74rem;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--brd);background:var(--bg2);color:var(--t2);cursor:pointer;transition:all .12s}.s-btn:hover{color:var(--t1);border-color:var(--t3)}
    @media(max-width:480px){.tb-in{height:42px}.logo-text{font-size:1.08rem}.ct{font-size:.92rem}.r-ttl{font-size:1.3rem}}
  </style>
</head>
